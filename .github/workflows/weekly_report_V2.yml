name: CSM Weekly Intelligence Report

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic schedule python-dotenv
      - name: Run Report
        env:
          LOOKER_BASE_URL:      ${{ secrets.LOOKER_BASE_URL }}
          LOOKER_CLIENT_ID:     ${{ secrets.LOOKER_CLIENT_ID }}
          LOOKER_CLIENT_SECRET: ${{ secrets.LOOKER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL_ID:     ${{ secrets.SLACK_CHANNEL_ID }}
          GITHUB_TOKEN:         ${{ secrets.SECRET_GITHUB }}
          GITHUB_REPO:          bduensing/customergrowthteam
        run: python weekly_report.py --now
      - uses: actions/upload-artifact@v4
        with:
          name: csm-weekly-report
          path: csm_report_*.html
          retention-days: 90
