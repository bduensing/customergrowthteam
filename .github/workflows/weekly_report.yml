name: Weekly Customer Growth Report
on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic python-dotenv
      - name: Generate report
        env:
          LOOKER_BASE_URL: https://monsterlg.looker.com
          LOOKER_CLIENT_ID: ${{ secrets.LOOKER_CLIENT_ID }}
          LOOKER_CLIENT_SECRET: ${{ secrets.LOOKER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0AUSR83YMP
          SLACK_CANVAS_ID: F0AUBSHSLK0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_report.py --now
      - name: Commit report
        run: |
          git config user.name "Customer Growth Bot"
          git config user.email "bduensing@monsterlg.com"
          git add reports/
          git diff --staged --quiet || git commit -m "Weekly report — $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
